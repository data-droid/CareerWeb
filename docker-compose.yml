services:
  backend:
    build:
      context: ../CareerWeb-backend
    env_file:
      - ../CareerWeb-backend/.env
    volumes:
      - ../CareerWeb-backend:/app
    ports:
      - "8000:8000"
  frontend:
    build:
      context: .
    environment:
      - VITE_API_PROXY=http://backend:8000
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
